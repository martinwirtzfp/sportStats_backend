# ===== JSON profile — H2 + auto-load from fixtures/ JSON files =====
# Inherits H2 datasource from application-dev.properties
spring.datasource.url=jdbc:h2:mem:sportstatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Logging
logging.level.com.sports.backend.config.JsonDataLoaderRunner=INFO
logging.level.com.sports.backend.ingestion=INFO

spring.jpa.open-in-view=false
