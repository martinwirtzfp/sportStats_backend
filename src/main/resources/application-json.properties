# ===== json profile — H2 in-memory + fixture data auto-loaded at startup =====
# Resets completely on every restart. Use for demos and presentations.
spring.datasource.url=jdbc:h2:mem:sportstatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Fresh schema on every restart (JsonDataLoaderRunner refills data automatically)
spring.jpa.hibernate.ddl-auto=create-drop

# Logging
logging.level.com.sports.backend.config.JsonDataLoaderRunner=INFO
logging.level.com.sports.backend.ingestion=INFO
