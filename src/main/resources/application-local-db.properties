# ===== local profile — H2 persistent file database =====
# Data survives server restarts. DB file stored at ~/sportstatsdb.mv.db
spring.datasource.url=jdbc:h2:file:~/sportstatsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# update: keeps existing data, only adds new tables/columns
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Logging
logging.level.com.sports.backend.ingestion=INFO
